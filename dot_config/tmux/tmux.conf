# General
set -g mouse on
# Name windows by directory (truncate the front, keep the tail) instead of the running command
set -g automatic-rename on
set -g automatic-rename-format '#{=/-18/…:pane_current_path}'
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set true colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Open panes in current directory, then re-tile into a grid (each pane in a corner)
bind '"' split-window -v -c "#{pane_current_path}" \; select-layout tiled
bind '%' split-window -h -c "#{pane_current_path}" \; select-layout tiled

# Move panes between windows
# prefix + m : mark the current pane; prefix + J : join the marked pane into this window
bind m select-pane -m
bind J join-pane \; select-layout tiled
# prefix + b : break the current pane out into its own new window (alias for default '!')
bind b break-pane

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Plugin Config
## yank
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-V send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

## Dracula Theme
set -g @dracula-show-powerline true
set -g @dracula-show-empty-plugins false
set -g @dracula-plugins "ssh-session time"
set -g @dracula-show-timezone false
set -g @dracula-time-format "%F %R"
set -g @dracula-kubernetes-hide-user true
set -g @dracula-kubernetes-context-label "k8s"

## Resurrect
set -g @resurrect-save 's'
set -g @resurrect-restore 'r'

run '~/.tmux/plugins/tpm/tpm'
