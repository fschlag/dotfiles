# General
set -g mouse on
# Window names are managed by window-name.sh using Git context and foreground commands.
set -g automatic-rename off
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-hook -g after-select-pane[90] \
    'run-shell -b "~/.config/tmux/window-name.sh --pane #{pane_id} -- #{pane_current_command}"'
set-hook -g after-select-window[90] \
    'run-shell -b "~/.config/tmux/window-name.sh --pane #{pane_id} -- #{pane_current_command}"'

# Set true colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Open panes in current directory, then re-tile into a grid (each pane in a corner)
bind '"' split-window -v -c "#{pane_current_path}" \; select-layout tiled
bind '%' split-window -h -c "#{pane_current_path}" \; select-layout tiled

# Move panes between windows
# prefix + m : mark the current pane; prefix + J : join the marked pane into this window
bind m select-pane -m
bind J join-pane \; select-layout tiled
# prefix + b : break the current pane out into its own new window (alias for default '!')
bind b break-pane

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Status bar (native, inherits the terminal color scheme from Ghostty)
# Status bar (native, inherits the terminal color scheme from Ghostty)
# Uses named palette colors so it adapts to whatever theme Ghostty sets.
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default fg=white"

# Left: session name in an accent block
set -g status-left "#[fg=black,bg=cyan,bold] #S #[default] "
set -g status-left-length 30
set -g status-right ""
set -g status-right-length 0

# Windows: project-colored tabs; the active one gets a bold Nerd Font marker.
set -g @window_color "magenta"
set -g window-status-format "#[fg=black,bg=#{@window_color}] #{?window_bell_flag,🔔 ,}#I #W #[default]"
set -g window-status-current-format "#[fg=black,bg=#{@window_color},bold]  #{?window_bell_flag,🔔 ,}#I #W #[default]"
set -g window-status-separator " "
set -g window-status-activity-style "fg=yellow,bold"

# Repack window tabs when their names, count, or available width changes.
set-hook -g alert-bell[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g window-linked[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g window-unlinked[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g after-select-window[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g after-rename-window[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g after-rename-session[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g client-resized[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g client-attached[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g client-detached[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
set-hook -g client-session-changed[91] \
    'run-shell -b "~/.config/tmux/wrap-tabs.sh"'
run-shell -b "~/.config/tmux/wrap-tabs.sh"

# Visible pane borders (active border highlighted)
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=magenta"

# Command/message line
set -g message-style "fg=black,bg=cyan,bold"

# Plugin Config
## yank
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-V send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

## Resurrect
set -g @resurrect-save 's'
set -g @resurrect-restore 'r'

run '~/.tmux/plugins/tpm/tpm'
